name: Tests
on: [push, pull_request]
jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install Neovim
        uses: rhysd/action-setup-vim@v1
        with:
          neovim: true
          version: stable
      - name: Run tests
        run: |
          nvim --headless -u NONE --noplugin -l tests/tty_test.lua
          nvim --headless -u NONE --noplugin -l tests/link_types_test.lua
          nvim --headless -u NONE --noplugin -l tests/markdown_checkbox_test.lua
